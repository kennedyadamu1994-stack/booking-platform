<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">Loading Session…</title>
  <meta name="description" id="pageDescription" content="Session information" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <meta property="og:title"       id="ogTitle"       content="Book Your Session" />
  <meta property="og:description" id="ogDescription" content="Join this session" />
  <meta property="og:image"       id="ogImage"       content="" />
  <meta property="og:url"         id="ogUrl"         content="" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      id="twitterImage"  content="" />

  <style>
    :root {
      --accent:        #FF1B6E;
      --accent-dim:    rgba(255,27,110,0.10);
      --accent-mid:    rgba(255,27,110,0.28);
      --accent-hover:  #e01560;
      --text:          #f0f0f0;
      --text-muted:    rgba(255,255,255,0.62);
      --text-faint:    rgba(255,255,255,0.32);
      --bg:            #1B1B1B;
      --bg-card:       #212121;
      --bg-elevated:   #2a2a2a;
      --border:        rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.14);
      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.12);
      --font-serif:    'Young Serif', Georgia, serif;
      --font-sans:     'DM Sans', -apple-system, sans-serif;
      --r:             3px;
      --r-lg:          8px;

      --c-verified:    rgba(0,128,0,0.9);
      --c-likely:      rgba(34,139,34,0.9);
      --c-probably:    rgba(202,138,4,0.9);
      --c-uncertain:   rgba(234,88,12,0.9);
      --c-unconfirmed: rgba(185,28,28,0.9);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* ── NAV ── */
    .site-nav {
      position: sticky; top: 0;
      background: rgba(27,27,27,0.97);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 9999;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0.85rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.65rem;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-brand-logo { height: 30px; object-fit: contain; }
    .nav-brand-name { font-family: var(--font-serif); font-size: 0.95rem; color: var(--text); line-height: 1.15; }
    .nav-brand-name small {
      display: block; font-family: var(--font-sans); font-size: 0.55rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint);
    }
    .nav-back {
      color: var(--text-muted); text-decoration: none;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.03em;
      padding: 0.4rem 0.75rem; transition: color 0.2s; white-space: nowrap;
    }
    .nav-back:hover { color: var(--accent); }

    /* ── PAGE ── */
    .page { max-width: 1200px; margin: 0 auto; padding-bottom: 7rem; }

    /* ── LOADING / ERROR ── */
    .loading-state { text-align: center; padding: 5rem 2rem; color: var(--text-faint); }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 0.85rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; font-weight: 500; }

    .error-state {
      margin: 2rem; background: var(--bg-card);
      border: 1px solid rgba(239,68,68,0.3); border-radius: var(--r-lg);
      padding: 2rem; text-align: center;
    }
    .error-state h2 { font-family: var(--font-serif); font-size: 1.4rem; font-weight: normal; color: #ef4444; margin-bottom: 0.5rem; }
    .error-state p  { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
    .error-state a  { color: var(--accent); text-decoration: none; }

    /* ── HERO ── */
    .hero-card {
      position: relative; min-height: 88vh;
      display: flex; align-items: flex-end;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)) center/cover no-repeat;
    }
    .hero-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 340px;
      background: linear-gradient(to bottom, transparent 0%, rgba(27,27,27,0.5) 35%, rgba(27,27,27,0.9) 65%, #1B1B1B 100%);
      pointer-events: none; z-index: 1;
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 6rem 2rem 3rem; width: 100%; max-width: 1200px; margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: var(--accent-dim); border: 1px solid var(--accent-mid);
      border-radius: 100px; padding: 0.3rem 0.9rem;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.9rem;
    }
    .hero-badge-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.65)} }
    .hero-club {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); display: block; margin-bottom: 0.55rem;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: normal; line-height: 1.02; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 0.9rem;
    }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: center; margin-bottom: 1.75rem; }
    .hero-meta-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 100px;
      padding: 0.28rem 0.8rem; font-size: 0.78rem; color: var(--text-muted);
    }
    .hero-meta-pill i { color: var(--accent); font-size: 0.7rem; }
    .hero-share-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.75rem 1.4rem; font-family: var(--font-sans);
      font-size: 0.82rem; font-weight: 600; border-radius: var(--r);
      background: rgba(255,255,255,0.09); color: var(--text);
      border: 1px solid rgba(255,255,255,0.18); cursor: pointer;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .hero-share-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.28); }

    /* ── INFO LIST ── */
    .info-panel { background: var(--bg-card); border-bottom: 1px solid var(--border); }
    .info-panel-inner { padding: 0 2rem; }

    .notes-box {
      padding: 1.5rem 0 1.25rem;
      font-size: 0.9rem; color: var(--text-muted); line-height: 1.75;
      border-bottom: 1px solid var(--border);
    }

    .info-row {
      display: flex; align-items: center;
      gap: 1.25rem; padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }

    .info-row-icon {
      color: var(--accent); font-size: 1rem;
      width: 22px; text-align: center; flex-shrink: 0;
    }
    .info-row-label {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-faint);
      flex-shrink: 0;
      /* Fixed width so values always align */
      min-width: 130px;
    }
    .info-row-value {
      font-size: 0.975rem; color: var(--text);
      flex: 1; line-height: 1.45;
    }
    .info-row-value a {
      color: var(--accent); text-decoration: none; font-weight: 500;
    }
    .info-row-value a:hover { text-decoration: underline; }

    /* Confidence badge inline */
    .conf-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: var(--r);
      font-size: 0.72rem; font-weight: 700; color: #fff;
      font-family: var(--font-sans); letter-spacing: 0.02em;
    }
    .conf-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
    .conf-badge.verified    { background: var(--c-verified); }
    .conf-badge.likely      { background: var(--c-likely); }
    .conf-badge.probably    { background: var(--c-probably); }
    .conf-badge.uncertain   { background: var(--c-uncertain); }
    .conf-badge.unconfirmed { background: var(--c-unconfirmed); }

    /* Club link buttons inline */
    .club-link-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .club-link-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; border-radius: var(--r);
      font-size: 0.75rem; font-weight: 600; text-decoration: none;
      transition: all 0.18s; border: 1px solid;
    }
    .club-link-btn.primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .club-link-btn.primary:hover { opacity: 0.88; }
    .club-link-btn.secondary {
      background: transparent; color: var(--text-muted); border-color: var(--border-bright);
    }
    .club-link-btn.secondary:hover { border-color: var(--accent-mid); color: var(--text); }

    /* ── STICKY CTA ── */
    .sticky-cta {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff; border: none;
      padding: 0.9rem 2.2rem; font-family: var(--font-sans);
      font-size: 0.9rem; font-weight: 600; border-radius: var(--r);
      cursor: pointer; box-shadow: 0 8px 28px rgba(255,27,110,0.4);
      z-index: 1000; text-decoration: none; white-space: nowrap;
      transition: all 0.22s; display: none;
      align-items: center; gap: 0.5rem;
    }
    .sticky-cta:hover {
      background: var(--accent-hover); transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 10px 32px rgba(255,27,110,0.5);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      background: var(--bg-elevated); border: 1px solid var(--border-bright);
      color: var(--text); padding: 0.65rem 1.2rem; border-radius: var(--r);
      font-size: 0.8rem; font-weight: 500; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .toast.show { opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-inner { padding: 0.85rem 1.25rem; }
      .hero-card { min-height: 78vh; }
      .hero-content { padding: 4rem 1.25rem 2.5rem; }
      .hero-title { font-size: 2.2rem; }
      .info-panel-inner { padding: 0 1.25rem; }
      .info-row-label { min-width: 100px; }
      .sticky-cta { left: 1rem; right: 1rem; transform: none; width: calc(100% - 2rem); }
      .sticky-cta:hover { transform: none; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="https://www.thenbrh.co.uk/" class="nav-brand">
        <img class="nav-brand-logo"
          src="https://images.squarespace-cdn.com/content/6718416feaa24175e29324d4/9d6e6464-e1e5-4dde-9ae0-03df420cbd77/NBRH+Logo.png?content-type=image%2Fpng"
          alt="The NBRH" onerror="this.style.display='none'">
        <div class="nav-brand-name"><small>Sessions</small></div>
      </a>
      <a href="https://www.thenbrh.co.uk/" class="nav-back">← Browse Sessions</a>
    </div>
  </nav>

  <div class="page">

    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p class="loading-text">Loading session…</p>
    </div>

    <div id="error" class="error-state" style="display:none;">
      <h2>Session Not Found</h2>
      <p>This session doesn't exist or is no longer available.</p>
      <a href="https://www.thenbrh.co.uk/">Browse all sessions</a>
    </div>

    <div id="content" style="display:none;">

      <!-- HERO -->
      <div class="hero-card">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-fade"></div>
        <div class="hero-content">
          <div class="hero-badge" id="heroBadge" style="display:none;">
            <div class="hero-badge-dot"></div>
            <span id="heroBadgeText">Session</span>
          </div>
          <span class="hero-club" id="heroClub" style="display:none;"></span>
          <h1 class="hero-title" id="sessionTitle">Session Name</h1>
          <div class="hero-meta" id="heroMeta"></div>
          <button class="hero-share-btn" onclick="shareSession()">
            <i class="fa-solid fa-share-nodes" style="font-size:0.8rem;"></i> Share this session
          </button>
        </div>
      </div>

      <!-- INFO PANEL -->
      <div class="info-panel">
        <div class="info-panel-inner">
          <div id="notesDisplay" style="display:none;" class="notes-box"></div>
          <div id="infoList"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- STICKY CTA -->
  <a id="stickyCta" class="sticky-cta" href="#">
    Book Now <i class="fa-solid fa-arrow-right" style="font-size:0.8rem;"></i>
  </a>

  <div id="toast" class="toast">Link copied!</div>

  <script>
    const SHEET_ID = '1P4fON7qVFQt_w9OKoTiweLaT3GkpF9viS910E93BD48';
    const API_KEY  = 'AIzaSyDK2LyxRj64ILoXIO37OJyo9qgjWyq18cU';

    let sessionTemplate = null;

    const urlParams = new URLSearchParams(window.location.search);
    let sessionId   = urlParams.get('event');

    if (!sessionId) {
      showError();
    } else {
      sessionId.startsWith('NBRH') ? convertNbrhToSessionId(sessionId) : loadSessionData();
    }

    async function convertNbrhToSessionId(nbrhId) {
      try {
        const cleanId = nbrhId.split(':')[0];
        const res     = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sessions!A:AV?key=${API_KEY}`);
        if (!res.ok) throw new Error();
        const rows = (await res.json()).values || [];
        for (let i = 1; i < rows.length; i++) {
          const rid = rows[i][0];
          if (rid === nbrhId || rid === cleanId || (rid && rid.split(':')[0] === cleanId)) {
            sessionId = rows[i][43];
            loadSessionData();
            return;
          }
        }
        showError();
      } catch { showError(); }
    }

    async function loadSessionData() {
      try {
        const res = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Session%20Templates!A:AV?key=${API_KEY}`
        );
        if (!res.ok) throw new Error();
        const rows = (await res.json()).values || [];
        let found  = null;
        for (let i = 1; i < rows.length; i++) {
          if (rows[i][43] === sessionId) { found = rows[i]; break; }
        }
        if (!found) { showError(); return; }
        sessionTemplate = parseRow(found);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        renderPage();
      } catch (e) { console.error(e); showError(); }
    }

    function parseRow(r) {
      return {
        nbrhId:            r[0]  || '',
        activityType:      r[1]  || '',
        club:              r[2]  || '',
        className:         r[3]  || '',
        startTime:         r[5]  || '',
        duration:          r[6]  || '',
        address:           r[7]  || '',
        location:          r[8]  || '',
        totalPrice:        parseFloat(r[11]) || 0,
        difficultyLevel:   r[14] || '',
        bookingUrl:        r[15] || '',
        website:           r[16] || '',
        imageUrl:          r[17] || '',
        ageGroup:          r[18] || '',
        equipmentProvided: r[19] || '',
        cancellationHours: r[20] || '',
        indoorOutdoor:     r[21] || '',
        badge:             r[22] || '',
        audience:          r[23] || '',
        confidenceScore:   r[24] || '',
        vibe:              r[26] || '',
        notes:             r[40] || '',
        clubHubUrl:        r[41] || '',
        dayOfWeek:         r[42] || '',
        sessionId:         r[43] || '',
        endTime:           cleanEndTime(r[44], r[40]),
        bookingType:       (r[46] || 'stripe').toLowerCase(),
        type:              r[37] || ''
      };
    }

    function cleanEndTime(raw, notes) {
      if (raw && !raw.includes('1899') && !raw.includes('1900') && raw.trim()) {
        return raw.trim();
      }
      if (notes) {
        const parts = notes.split(' - ');
        if (parts.length >= 3) {
          const c = parts[2].trim();
          if (/\d{1,2}:\d{2}\s*(AM|PM)/i.test(c)) return c;
        }
      }
      return '';
    }

    function renderPage() {
      const s = sessionTemplate;

      /* Meta */
      const pageTitle = `${s.className} | The NBRH`;
      document.getElementById('pageTitle').textContent = pageTitle;
      document.getElementById('pageDescription').setAttribute('content', s.notes || s.activityType);
      document.getElementById('ogTitle').setAttribute('content', pageTitle);
      document.getElementById('ogDescription').setAttribute('content', s.notes || `${s.className} at ${s.location}`);
      if (s.imageUrl) {
        document.getElementById('ogImage').setAttribute('content', s.imageUrl);
        document.getElementById('twitterImage').setAttribute('content', s.imageUrl);
      }
      document.getElementById('ogUrl').setAttribute('content', location.href);

      /* Hero */
      if (s.imageUrl) {
        document.getElementById('heroBg').style.background =
          `linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)), url('${s.imageUrl}') center/cover no-repeat`;
      }
      if (s.type) {
        document.getElementById('heroBadge').style.display = 'inline-flex';
        document.getElementById('heroBadgeText').textContent = s.type;
      }
      if (s.club) {
        const c = document.getElementById('heroClub');
        c.textContent = s.club;
        c.style.display = 'block';
      }
      document.getElementById('sessionTitle').textContent = s.className || 'Session';

      const meta = document.getElementById('heroMeta');
      [
        s.location && { icon: 'fa-location-dot', text: s.location },
        (s.dayOfWeek && s.startTime) && { icon: 'fa-clock', text: `${s.dayOfWeek}s · ${s.endTime ? s.startTime + ' – ' + s.endTime : s.startTime}` },
        s.difficultyLevel && { icon: 'fa-signal', text: s.difficultyLevel },
        s.totalPrice > 0 && { icon: 'fa-pound-sign', text: `£${s.totalPrice.toFixed(2)}` }
      ].filter(Boolean).forEach(p => {
        const span = document.createElement('span');
        span.className = 'hero-meta-pill';
        span.innerHTML = `<i class="fa-solid ${p.icon}"></i> ${p.text}`;
        meta.appendChild(span);
      });

      /* Sticky CTA */
      const ctaUrl = s.website || s.bookingUrl;
      if (ctaUrl) {
        const sticky = document.getElementById('stickyCta');
        sticky.href          = ctaUrl;
        sticky.style.display = 'inline-flex';
      }

      /* Notes */
      if (s.notes && s.notes.trim()) {
        const nd = document.getElementById('notesDisplay');
        nd.textContent     = s.notes.trim();
        nd.style.display   = 'block';
      }

      /* Info list */
      const list = document.getElementById('infoList');

      const addRow = (icon, label, valueHtml) => {
        if (!valueHtml) return;
        const row = document.createElement('div');
        row.className = 'info-row';
        row.innerHTML = `
          <span class="info-row-icon"><i class="fa-solid ${icon}"></i></span>
          <span class="info-row-label">${label}</span>
          <span class="info-row-value">${valueHtml}</span>`;
        list.appendChild(row);
      };

      /* Schedule */
      addRow('fa-location-dot',    'Location',     s.location);
      addRow('fa-calendar-days',   'Day',          s.dayOfWeek);
      if (s.startTime) {
        const timeVal = s.endTime
          ? `${s.startTime} <span style="color:var(--text-faint);font-size:0.82rem;">→</span> ${s.endTime}`
          : s.startTime;
        addRow('fa-clock', 'Time', timeVal);
      }
      if (s.duration) {
        const mins = parseInt(s.duration) || 0;
        const hrs  = Math.floor(mins / 60);
        const rem  = mins % 60;
        addRow('fa-hourglass-half', 'Duration', hrs > 0 ? `${hrs}h${rem ? ' ' + rem + 'm' : ''}` : `${mins} min`);
      }
      addRow('fa-pound-sign',      'Price',        s.totalPrice > 0 ? `£${s.totalPrice.toFixed(2)}` : 'Free');

      /* Session info */
      addRow('fa-dumbbell',        'Activity',     s.activityType);
      addRow('fa-signal',          'Level',        s.difficultyLevel);
      addRow('fa-user-group',      'Age Group',    s.ageGroup);
      addRow('fa-users',           'Audience',     s.audience);
      addRow('fa-house',           'Venue Type',   s.indoorOutdoor);
      addRow('fa-bag-shopping',    'Equipment',    s.equipmentProvided
        ? (s.equipmentProvided.toLowerCase() === 'yes' ? 'Provided' : 'Bring your own')
        : null);
      addRow('fa-clock-rotate-left','Cancellation', s.cancellationHours ? `${s.cancellationHours} hours notice required` : null);
      addRow('fa-star',            'Vibe',         s.vibe);
      addRow('fa-tag',             'Badge',        s.badge);

      /* Confidence */
      if (s.confidenceScore) {
        const cls = confClass(s.confidenceScore);
        addRow('fa-shield-check', 'Confidence',
          `<span class="conf-badge ${cls}"><span class="dot"></span>${s.confidenceScore}</span>`);
      }

      /* Address */
      if (s.address) {
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.address)}`;
        addRow('fa-map-pin', 'Address',
          `<a href="${mapsUrl}" target="_blank" rel="noopener">${s.address}</a>`);
      }

      /* Club */
      if (s.club || s.clubHubUrl || s.website) {
        let clubHtml = s.club ? `<span style="font-family:var(--font-serif);font-size:1rem;">${s.club}</span>` : '';
        const links = [];
        if (s.clubHubUrl) links.push(`<a class="club-link-btn primary" href="${s.clubHubUrl}" target="_blank" rel="noopener"><i class="fa-solid fa-building"></i> View Profile</a>`);
        if (s.website)    links.push(`<a class="club-link-btn secondary" href="${s.website}" target="_blank" rel="noopener"><i class="fa-solid fa-globe"></i> Website</a>`);
        if (links.length) clubHtml += `<div class="club-link-row">${links.join('')}</div>`;
        if (clubHtml) addRow('fa-trophy', 'Club', clubHtml);
      }
    }

    function confClass(label) {
      return { 'Verified': 'verified', 'Likely Active': 'likely', 'Probably Active': 'probably',
               'Uncertain': 'uncertain', 'Unconfirmed': 'unconfirmed' }[label] || 'unconfirmed';
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display   = '';
    }

    async function shareSession() {
      const url   = location.href;
      const title = sessionTemplate ? sessionTemplate.className : 'Check out this session';
      if (navigator.share) {
        try { await navigator.share({ title, text: `Join me at ${title}`, url }); return; } catch {}
      }
      try { await navigator.clipboard.writeText(url); }
      catch {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.cssText = 'position:fixed;top:-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>

</body>
</html>
