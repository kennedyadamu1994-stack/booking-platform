<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="pageTitle">Loading Session…</title>
  <meta name="description" id="pageDescription" content="Session information" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

  <meta property="og:title"       id="ogTitle"       content="Book Your Session" />
  <meta property="og:description" id="ogDescription" content="Join this session" />
  <meta property="og:image"       id="ogImage"       content="" />
  <meta property="og:url"         id="ogUrl"         content="" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      id="twitterImage"  content="" />

  <style>
    /* ══════════════════════════════════════════
       TOKENS
    ══════════════════════════════════════════ */
    :root {
      --accent:        #FF1B6E;
      --accent-dim:    rgba(255,27,110,0.10);
      --accent-mid:    rgba(255,27,110,0.28);
      --accent-hover:  #e01560;
      --text:          #f0f0f0;
      --text-muted:    rgba(255,255,255,0.62);
      --text-faint:    rgba(255,255,255,0.32);
      --bg:            #1B1B1B;
      --bg-card:       #212121;
      --bg-elevated:   #2a2a2a;
      --border:        rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.14);
      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.12);
      --amber:         #f59e0b;
      --font-serif:    'Young Serif', Georgia, serif;
      --font-sans:     'DM Sans', -apple-system, sans-serif;
      --r:             3px;
      --r-lg:          8px;

      /* Confidence colours */
      --c-verified:    rgba(0,128,0,0.9);
      --c-likely:      rgba(34,139,34,0.9);
      --c-probably:    rgba(202,138,4,0.9);
      --c-uncertain:   rgba(234,88,12,0.9);
      --c-unconfirmed: rgba(185,28,28,0.9);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* NAV */
    .site-nav {
      position: sticky; top: 0;
      background: rgba(27,27,27,0.97);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      z-index: 9999;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0.85rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.65rem;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-brand-logo { height: 30px; object-fit: contain; }
    .nav-brand-name {
      font-family: var(--font-serif); font-size: 0.95rem;
      color: var(--text); line-height: 1.15;
    }
    .nav-brand-name small {
      display: block; font-family: var(--font-sans);
      font-size: 0.55rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-faint);
    }
    .nav-back {
      color: var(--text-muted); text-decoration: none;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.03em;
      padding: 0.4rem 0.75rem; transition: color 0.2s; white-space: nowrap;
    }
    .nav-back:hover { color: var(--accent); }

    /* PAGE */
    .page { max-width: 1200px; margin: 0 auto; padding-bottom: 7rem; }

    /* LOADING / ERROR */
    .loading-state { text-align: center; padding: 5rem 2rem; color: var(--text-faint); }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 0.85rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; font-weight: 500; }

    .error-state {
      margin: 2rem; background: var(--bg-card);
      border: 1px solid rgba(239,68,68,0.3); border-radius: var(--r-lg);
      padding: 2rem; text-align: center;
    }
    .error-state h2 { font-family: var(--font-serif); font-size: 1.4rem; font-weight: normal; color: #ef4444; margin-bottom: 0.5rem; }
    .error-state p  { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1rem; }
    .error-state a  { color: var(--accent); text-decoration: none; }

    /* CONTENT */
    .content-grid { display: grid; gap: 1px; }
    .card { background: var(--bg-card); border-bottom: 1px solid var(--border); }
    .card-inner { padding: 2rem; }

    /* HERO */
    .hero-card {
      position: relative; min-height: 88vh;
      display: flex; align-items: flex-end;
      overflow: hidden; border-bottom: none;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)) center/cover no-repeat;
    }
    .hero-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 340px;
      background: linear-gradient(to bottom, transparent 0%, rgba(27,27,27,0.5) 35%, rgba(27,27,27,0.9) 65%, #1B1B1B 100%);
      pointer-events: none; z-index: 1;
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 6rem 2rem 3rem; width: 100%; max-width: 1200px; margin: 0 auto;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: var(--accent-dim); border: 1px solid var(--accent-mid);
      border-radius: 100px; padding: 0.3rem 0.9rem;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 0.9rem;
    }
    .hero-badge-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.65)} }

    .hero-club {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent); display: block; margin-bottom: 0.55rem;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: normal; line-height: 1.02; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 0.9rem;
    }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 0.55rem; align-items: center; margin-bottom: 1.75rem; }
    .hero-meta-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.16); border-radius: 100px;
      padding: 0.28rem 0.8rem; font-size: 0.78rem; color: var(--text-muted);
    }
    .hero-meta-pill i { color: var(--accent); font-size: 0.7rem; }

    .hero-share-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.75rem 1.4rem; font-family: var(--font-sans);
      font-size: 0.82rem; font-weight: 600; border-radius: var(--r);
      background: rgba(255,255,255,0.09); color: var(--text);
      border: 1px solid rgba(255,255,255,0.18); cursor: pointer;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .hero-share-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.28); }

    /* INFO GRID */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(150px,100%), 1fr));
      gap: 0.75rem;
    }
    .info-item {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 1rem;
      text-align: center; transition: border-color 0.2s;
    }
    .info-item:hover { border-color: var(--border-bright); }
    .info-icon { font-size: 1rem; color: var(--accent); margin-bottom: 0.45rem; display: block; }
    .info-label {
      font-size: 0.6rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 0.25rem; display: block;
    }
    .info-value {
      font-family: var(--font-serif); font-size: 0.92rem;
      color: var(--text); font-weight: normal; line-height: 1.3;
    }

    /* CONFIDENCE BADGE */
    .conf-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: var(--r);
      font-size: 0.72rem; font-weight: 700; color: #fff;
      font-family: var(--font-sans); letter-spacing: 0.02em;
    }
    .conf-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.6); flex-shrink: 0; }
    .conf-badge.verified    { background: var(--c-verified); }
    .conf-badge.likely      { background: var(--c-likely); }
    .conf-badge.probably    { background: var(--c-probably); }
    .conf-badge.uncertain   { background: var(--c-uncertain); }
    .conf-badge.unconfirmed { background: var(--c-unconfirmed); }

    /* TAGS */
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .tag {
      display: inline-flex; align-items: center;
      background: var(--bg-elevated); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 500; color: var(--text-muted);
    }
    .tag.vibe   { background: var(--accent-dim); border-color: var(--accent-mid); color: var(--accent); }
    .tag.green  { background: var(--green-dim);  border-color: rgba(34,197,94,0.2); color: var(--green); }
    .tag.badge-tag {
      background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.25);
      color: var(--amber);
    }

    /* EYEBROW + SECTION TITLE */
    .eyebrow {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.16em; color: var(--accent); display: block; margin-bottom: 0.35rem;
    }
    .section-title {
      font-family: var(--font-serif); font-size: clamp(1.25rem, 3vw, 1.65rem);
      font-weight: normal; line-height: 1.1; letter-spacing: -0.015em;
      color: var(--text); margin-bottom: 1.25rem;
    }

    /* COLLAPSIBLES */
    .collapsible-header {
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border);
    }
    .collapsible-header:hover { background: var(--bg-elevated); }
    .collapsible-title-row { display: flex; flex-direction: column; gap: 0.15rem; }
    .collapsible-title { font-family: var(--font-serif); font-size: 1.05rem; color: var(--text); font-weight: normal; }
    .collapsible-icon {
      width: 28px; height: 28px; border: 1px solid var(--border-bright);
      border-radius: var(--r); display: flex; align-items: center; justify-content: center;
      color: var(--text-faint); font-size: 0.65rem; flex-shrink: 0;
      transition: transform 0.3s, border-color 0.2s, color 0.2s;
    }
    .collapsible-header:hover .collapsible-icon { border-color: var(--accent); color: var(--accent); }
    .collapsible-header.open .collapsible-icon { transform: rotate(180deg); color: var(--accent); border-color: var(--accent); }
    .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .collapsible-content.open { max-height: 3000px; }
    .collapsible-inner { padding: 1.75rem 2rem; }

    /* ADDRESS BLOCK */
    .address-block {
      display: flex; align-items: flex-start; gap: 0.9rem;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 1.1rem 1.2rem;
      text-decoration: none; color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .address-block:hover { border-color: var(--accent-mid); transform: translateY(-1px); }
    .address-icon {
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--accent-dim); border: 1px solid var(--accent-mid);
      border-radius: var(--r); display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 0.9rem;
    }
    .address-text { font-size: 0.875rem; color: var(--text-muted); line-height: 1.6; }
    .address-cta { font-size: 0.72rem; color: var(--accent); margin-top: 0.35rem; display: block; font-weight: 600; }

    /* DETAIL LIST */
    .detail-list { display: grid; gap: 0.5rem; }
    .detail-row {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.75rem 0; border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; padding-bottom: 0; }
    .detail-icon { color: var(--accent); font-size: 0.85rem; margin-top: 0.15rem; flex-shrink: 0; width: 16px; text-align: center; }
    .detail-key { font-size: 0.72rem; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; min-width: 110px; padding-top: 0.1rem; }
    .detail-val { font-size: 0.875rem; color: var(--text-muted); line-height: 1.55; }

    /* NOTES BOX */
    .notes-box {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 1.1rem 1.2rem;
      font-size: 0.875rem; color: var(--text-muted);
      line-height: 1.7; white-space: pre-wrap; margin-bottom: 1.1rem;
    }

    /* CLUB HUB BUTTON */
    .club-hub-btn {
      display: inline-flex; align-items: center; gap: 0.55rem;
      background: var(--accent); color: #fff;
      padding: 0.75rem 1.4rem; border-radius: var(--r);
      font-size: 0.85rem; font-weight: 600; text-decoration: none;
      transition: all 0.2s; margin-bottom: 0.75rem;
    }
    .club-hub-btn:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,27,110,0.3); }
    .club-website-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
      padding: 0.6rem 1.1rem;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r); transition: border-color 0.2s, color 0.2s;
    }
    .club-website-link:hover { border-color: var(--border-bright); color: var(--text); }
    .club-links-row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; }

    /* STICKY CTA */
    .sticky-cta {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff; border: none;
      padding: 0.9rem 2.2rem; font-family: var(--font-sans);
      font-size: 0.9rem; font-weight: 600; border-radius: var(--r);
      cursor: pointer; box-shadow: 0 8px 28px rgba(255,27,110,0.4);
      z-index: 1000; text-decoration: none; white-space: nowrap;
      transition: all 0.22s; display: none;
      align-items: center; gap: 0.5rem;
    }
    .sticky-cta:hover {
      background: var(--accent-hover); transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 10px 32px rgba(255,27,110,0.5);
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
      background: var(--bg-elevated); border: 1px solid var(--border-bright);
      color: var(--text); padding: 0.65rem 1.2rem; border-radius: var(--r);
      font-size: 0.8rem; font-weight: 500; z-index: 9999;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .toast.show { opacity: 1; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .nav-inner { padding: 0.85rem 1.25rem; }
      .hero-card { min-height: 78vh; }
      .hero-content { padding: 4rem 1.25rem 2.5rem; }
      .hero-title { font-size: 2.2rem; }
      .card-inner { padding: 1.5rem 1.25rem; }
      .collapsible-header { padding: 1rem 1.25rem; }
      .collapsible-inner { padding: 1.5rem 1.25rem; }
      .info-grid { grid-template-columns: 1fr 1fr; }
      .detail-key { min-width: 90px; }
      .sticky-cta { left: 1rem; right: 1rem; transform: none; width: calc(100% - 2rem); }
      .sticky-cta:hover { transform: none; }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="https://www.thenbrh.co.uk/" class="nav-brand">
        <img class="nav-brand-logo"
          src="https://images.squarespace-cdn.com/content/6718416feaa24175e29324d4/9d6e6464-e1e5-4dde-9ae0-03df420cbd77/NBRH+Logo.png?content-type=image%2Fpng"
          alt="The NBRH" onerror="this.style.display='none'">
        <div class="nav-brand-name"><small>Sessions</small></div>
      </a>
      <a href="https://www.thenbrh.co.uk/" class="nav-back">← Browse Sessions</a>
    </div>
  </nav>

  <div class="page">

    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p class="loading-text">Loading session…</p>
    </div>

    <div id="error" class="error-state" style="display:none;">
      <h2>Session Not Found</h2>
      <p>This session doesn't exist or is no longer available.</p>
      <a href="https://www.thenbrh.co.uk/">Browse all sessions</a>
    </div>

    <div id="content" class="content-grid" style="display:none;">

      <!-- ─── HERO ─── -->
      <div class="hero-card">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-fade"></div>
        <div class="hero-content">
          <div class="hero-badge" id="heroBadge" style="display:none;">
            <div class="hero-badge-dot"></div>
            <span id="heroBadgeText">Session</span>
          </div>
          <span class="hero-club" id="heroClub" style="display:none;"></span>
          <h1 class="hero-title" id="sessionTitle">Session Name</h1>
          <div class="hero-meta" id="heroMeta"></div>
          <button class="hero-share-btn" onclick="shareSession()">
            <i class="fa-solid fa-share-nodes" style="font-size:0.8rem;"></i> Share this session
          </button>
        </div>
      </div>

      <!-- ─── INFO GRID ─── -->
      <div class="card">
        <div class="card-inner">
          <div class="info-grid" id="infoGrid"></div>
          <div class="tags-row" id="tagsRow"></div>
        </div>
      </div>

      <!-- ─── LOCATION & VENUE ─── -->
      <div class="card" id="venueCard" style="display:none;">
        <div class="collapsible-header" data-target="venueContent">
          <div class="collapsible-title-row">
            <span class="eyebrow" style="margin-bottom:0;">Getting There</span>
            <span class="collapsible-title">Location &amp; Venue</span>
          </div>
          <span class="collapsible-icon"><i class="fa-solid fa-chevron-down"></i></span>
        </div>
        <div class="collapsible-content" id="venueContent">
          <div class="collapsible-inner" id="venueInner"></div>
        </div>
      </div>

      <!-- ─── SESSION DETAILS ─── -->
      <div class="card" id="detailsCard" style="display:none;">
        <div class="collapsible-header" data-target="detailsContent">
          <div class="collapsible-title-row">
            <span class="eyebrow" style="margin-bottom:0;">About This Session</span>
            <span class="collapsible-title">Session Details</span>
          </div>
          <span class="collapsible-icon"><i class="fa-solid fa-chevron-down"></i></span>
        </div>
        <div class="collapsible-content" id="detailsContent">
          <div class="collapsible-inner" id="detailsInner"></div>
        </div>
      </div>

      <!-- ─── THE CLUB ─── -->
      <div class="card" id="clubCard" style="display:none;">
        <div class="collapsible-header" data-target="clubContent">
          <div class="collapsible-title-row">
            <span class="eyebrow" style="margin-bottom:0;">Club Information</span>
            <span class="collapsible-title">The Club</span>
          </div>
          <span class="collapsible-icon"><i class="fa-solid fa-chevron-down"></i></span>
        </div>
        <div class="collapsible-content" id="clubContent">
          <div class="collapsible-inner" id="clubInner"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- STICKY CTA -->
  <a id="stickyCta" class="sticky-cta" href="#">
    Book Now <i class="fa-solid fa-arrow-right" style="font-size:0.8rem;"></i>
  </a>

  <div id="toast" class="toast">Link copied!</div>

  <script>
    /* ══════════════════════════════════════════
       CONFIG
    ══════════════════════════════════════════ */
    const SHEET_ID = '1P4fON7qVFQt_w9OKoTiweLaT3GkpF9viS910E93BD48';
    const API_KEY  = 'AIzaSyDK2LyxRj64ILoXIO37OJyo9qgjWyq18cU';

    let sessionTemplate = null;

    /* ══════════════════════════════════════════
       BOOT
    ══════════════════════════════════════════ */
    const urlParams = new URLSearchParams(window.location.search);
    let sessionId   = urlParams.get('event');

    if (!sessionId) {
      showError();
    } else {
      sessionId.startsWith('NBRH') ? convertNbrhToSessionId(sessionId) : loadSessionData();
    }

    async function convertNbrhToSessionId(nbrhId) {
      try {
        const cleanId = nbrhId.split(':')[0];
        const res     = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Sessions!A:AV?key=${API_KEY}`);
        if (!res.ok) throw new Error();
        const rows = (await res.json()).values || [];
        for (let i = 1; i < rows.length; i++) {
          const rid = rows[i][0];
          if (rid === nbrhId || rid === cleanId || (rid && rid.split(':')[0] === cleanId)) {
            sessionId = rows[i][43];
            loadSessionData();
            return;
          }
        }
        showError();
      } catch { showError(); }
    }

    /* ══════════════════════════════════════════
       LOAD
    ══════════════════════════════════════════ */
    async function loadSessionData() {
      try {
        const res = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Session%20Templates!A:AV?key=${API_KEY}`
        );
        if (!res.ok) throw new Error();
        const rows = (await res.json()).values || [];
        let found  = null;
        for (let i = 1; i < rows.length; i++) {
          if (rows[i][43] === sessionId) { found = rows[i]; break; }
        }
        if (!found) { showError(); return; }
        sessionTemplate = parseRow(found);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'grid';
        renderPage();
        initCollapsibles();
      } catch (e) { console.error(e); showError(); }
    }

    /* ══════════════════════════════════════════
       PARSE ROW
    ══════════════════════════════════════════ */
    function parseRow(r) {
      return {
        nbrhId:            r[0]  || '',
        activityType:      r[1]  || '',
        club:              r[2]  || '',
        className:         r[3]  || '',
        date:              r[4]  || '',
        startTime:         r[5]  || '',
        duration:          r[6]  || '',
        address:           r[7]  || '',
        location:          r[8]  || '',
        basePrice:         parseFloat(r[9])  || 0,
        totalPrice:        parseFloat(r[11]) || 0,
        spotsAvailable:    parseInt(r[12])   || 0,
        totalSpots:        parseInt(r[13])   || 0,
        difficultyLevel:   r[14] || '',
        bookingUrl:        r[15] || '',
        website:           r[16] || '',
        imageUrl:          r[17] || '',
        ageGroup:          r[18] || '',
        equipmentProvided: r[19] || '',
        cancellationHours: r[20] || '',
        indoorOutdoor:     r[21] || '',
        badge:             r[22] || '',
        audience:          r[23] || '',
        confidenceScore:   r[24] || '',
        vibe:              r[26] || '',
        notes:             r[40] || '',
        clubHubUrl:        r[41] || '',
        dayOfWeek:         r[42] || '',
        sessionId:         r[43] || '',
        endTime:           cleanEndTime(r[44], r[40], r[5]),
        bookingType:       (r[46] || 'stripe').toLowerCase(),
        transactionFee:    parseFloat(r[47]) || 0,
        type:              r[37] || ''
      };
    }

    /* End time: API returns formatted time; CSV exports 12/30/1899. Fall back to notes. */
    function cleanEndTime(raw, notes, startTime) {
      if (raw && !raw.includes('1899') && !raw.includes('1900') && raw.trim() !== '') {
        return raw.trim();
      }
      // Extract from notes: "Friday - 5:30 PM - 7:30 PM - Camden - ..."
      if (notes) {
        const parts = notes.split(' - ');
        if (parts.length >= 3) {
          const candidate = parts[2].trim();
          if (/\d{1,2}:\d{2}\s*(AM|PM)/i.test(candidate)) return candidate;
        }
      }
      return '';
    }

    /* ══════════════════════════════════════════
       RENDER PAGE
    ══════════════════════════════════════════ */
    function renderPage() {
      const s = sessionTemplate;

      /* Meta tags */
      const pageTitle = `${s.className} | The NBRH`;
      document.getElementById('pageTitle').textContent = pageTitle;
      document.getElementById('pageDescription').setAttribute('content', s.notes || s.activityType);
      document.getElementById('ogTitle').setAttribute('content', pageTitle);
      document.getElementById('ogDescription').setAttribute('content', s.notes || `${s.className} at ${s.location}`);
      if (s.imageUrl) {
        document.getElementById('ogImage').setAttribute('content', s.imageUrl);
        document.getElementById('twitterImage').setAttribute('content', s.imageUrl);
      }
      document.getElementById('ogUrl').setAttribute('content', location.href);

      /* Hero */
      if (s.imageUrl) {
        document.getElementById('heroBg').style.background =
          `linear-gradient(rgba(0,0,0,0.48),rgba(0,0,0,0.48)), url('${s.imageUrl}') center/cover no-repeat`;
      }
      if (s.type) {
        const b = document.getElementById('heroBadge');
        b.style.display = 'inline-flex';
        document.getElementById('heroBadgeText').textContent = s.type;
      }
      if (s.club) {
        const c = document.getElementById('heroClub');
        c.textContent = s.club;
        c.style.display = 'block';
      }
      document.getElementById('sessionTitle').textContent = s.className || 'Session';

      /* Hero meta pills */
      const meta = document.getElementById('heroMeta');
      const pills = [];
      if (s.location) pills.push({ icon: 'fa-location-dot', text: s.location });
      if (s.dayOfWeek && s.startTime) {
        const timeStr = s.endTime ? `${s.startTime} – ${s.endTime}` : s.startTime;
        pills.push({ icon: 'fa-clock', text: `${s.dayOfWeek}s · ${timeStr}` });
      }
      if (s.difficultyLevel) pills.push({ icon: 'fa-signal',     text: s.difficultyLevel });
      if (s.totalPrice > 0)  pills.push({ icon: 'fa-pound-sign', text: `£${s.totalPrice.toFixed(2)}` });
      pills.forEach(p => {
        const span = document.createElement('span');
        span.className = 'hero-meta-pill';
        span.innerHTML = `<i class="fa-solid ${p.icon}"></i> ${p.text}`;
        meta.appendChild(span);
      });

      /* Sticky CTA */
      const ctaUrl = s.website || s.bookingUrl;
      if (ctaUrl) {
        const sticky = document.getElementById('stickyCta');
        sticky.href         = ctaUrl;
        sticky.style.display = 'inline-flex';
      }

      /* ── Info Grid ── */
      const grid = document.getElementById('infoGrid');
      const addInfo = (icon, label, html) => {
        if (!html) return;
        const el = document.createElement('div');
        el.className = 'info-item';
        el.innerHTML = `<span class="info-icon"><i class="fa-solid ${icon}"></i></span><span class="info-label">${label}</span><div class="info-value">${html}</div>`;
        grid.appendChild(el);
      };

      addInfo('fa-location-dot', 'Location', s.location);
      addInfo('fa-calendar-days', 'Day', s.dayOfWeek);

      if (s.startTime) {
        const timeHtml = s.endTime ? `${s.startTime}<br><span style="font-size:0.78rem;color:var(--text-muted);">${s.endTime}</span>` : s.startTime;
        addInfo('fa-clock', 'Time', timeHtml);
      }

      if (s.duration) {
        const mins = parseInt(s.duration) || 0;
        const hrs  = Math.floor(mins / 60);
        const rem  = mins % 60;
        const txt  = hrs > 0 ? `${hrs}h${rem ? ' ' + rem + 'm' : ''}` : `${mins} min`;
        addInfo('fa-hourglass-half', 'Duration', txt);
      }

      if (s.totalPrice > 0) {
        addInfo('fa-pound-sign', 'Price', `£${s.totalPrice.toFixed(2)}`);
      } else {
        addInfo('fa-pound-sign', 'Price', 'Free');
      }

      addInfo('fa-signal',     'Level',     s.difficultyLevel);
      addInfo('fa-user-group', 'Age Group', s.ageGroup);

      if (s.confidenceScore) {
        const cls   = confClass(s.confidenceScore);
        const badge = `<span class="conf-badge ${cls}"><span class="dot"></span>${s.confidenceScore}</span>`;
        addInfo('fa-shield-check', 'Confidence', badge);
      }

      /* Tags row */
      const tags = document.getElementById('tagsRow');
      if (s.badge)                                              addTag(tags, s.badge, 'badge-tag');
      if (s.vibe)                                               addTag(tags, s.vibe, 'vibe');
      if (s.indoorOutdoor)                                      addTag(tags, s.indoorOutdoor);
      if (s.audience)                                           addTag(tags, s.audience);
      if (s.equipmentProvided?.toLowerCase() === 'yes')         addTag(tags, 'Equipment Provided', 'green');

      /* ── Location & Venue dropdown ── */
      if (s.address) {
        document.getElementById('venueCard').style.display = '';
        const inner = document.getElementById('venueInner');
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.address)}`;
        inner.innerHTML = `
          <a class="address-block" href="${mapsUrl}" target="_blank" rel="noopener">
            <div class="address-icon"><i class="fa-solid fa-location-dot"></i></div>
            <div>
              <div class="address-text">${s.address}</div>
              <span class="address-cta">Open in Google Maps →</span>
            </div>
          </a>`;
      }

      /* ── Session Details dropdown ── */
      const hasDetails = s.notes || s.activityType || s.audience || s.equipmentProvided || s.cancellationHours || s.indoorOutdoor;
      if (hasDetails) {
        document.getElementById('detailsCard').style.display = '';
        const inner = document.getElementById('detailsInner');
        let html = '';
        if (s.notes) html += `<div class="notes-box">${s.notes.trim()}</div>`;
        html += '<div class="detail-list">';
        const rows = [];
        if (s.activityType)      rows.push({ icon: 'fa-dumbbell',   key: 'Activity',     val: s.activityType });
        if (s.audience)          rows.push({ icon: 'fa-users',      key: 'Audience',     val: s.audience });
        if (s.ageGroup)          rows.push({ icon: 'fa-user-group', key: 'Age Group',    val: s.ageGroup });
        if (s.indoorOutdoor)     rows.push({ icon: 'fa-house',      key: 'Venue Type',   val: s.indoorOutdoor });
        if (s.equipmentProvided) rows.push({ icon: 'fa-bag-shopping','key': 'Equipment', val: s.equipmentProvided === 'Yes' ? 'Provided' : 'Bring your own' });
        if (s.cancellationHours) rows.push({ icon: 'fa-clock-rotate-left', key: 'Cancellation', val: `${s.cancellationHours} hours notice required` });
        rows.forEach(dr => {
          html += `<div class="detail-row">
            <span class="detail-icon"><i class="fa-solid ${dr.icon}"></i></span>
            <span class="detail-key">${dr.key}</span>
            <span class="detail-val">${dr.val}</span>
          </div>`;
        });
        html += '</div>';
        inner.innerHTML = html;
      }

      /* ── The Club dropdown ── */
      const hasClub = s.clubHubUrl || s.website || s.club;
      if (hasClub) {
        document.getElementById('clubCard').style.display = '';
        const inner = document.getElementById('clubInner');
        let html = '';
        if (s.club) {
          html += `<p style="font-family:var(--font-serif);font-size:1.2rem;color:var(--text);margin-bottom:1rem;font-weight:normal;">${s.club}</p>`;
        }
        html += '<div class="club-links-row">';
        if (s.clubHubUrl) {
          html += `<a class="club-hub-btn" href="${s.clubHubUrl}" target="_blank" rel="noopener">
            <i class="fa-solid fa-building"></i> View Club Profile
          </a>`;
        }
        if (s.website) {
          html += `<a class="club-website-link" href="${s.website}" target="_blank" rel="noopener">
            <i class="fa-solid fa-globe"></i> Club Website
          </a>`;
        }
        html += '</div>';
        inner.innerHTML = html;
      }
    }

    /* ══════════════════════════════════════════
       HELPERS
    ══════════════════════════════════════════ */
    function confClass(label) {
      if (!label) return 'unconfirmed';
      const map = {
        'Verified': 'verified', 'Likely Active': 'likely',
        'Probably Active': 'probably', 'Uncertain': 'uncertain', 'Unconfirmed': 'unconfirmed'
      };
      return map[label] || 'unconfirmed';
    }

    function addTag(container, text, cls) {
      if (!text) return;
      const el = document.createElement('span');
      el.className = 'tag' + (cls ? ' ' + cls : '');
      el.textContent = text;
      container.appendChild(el);
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display   = '';
    }

    /* ══════════════════════════════════════════
       SHARE
    ══════════════════════════════════════════ */
    async function shareSession() {
      const url   = location.href;
      const title = sessionTemplate ? sessionTemplate.className : 'Check out this session';
      if (navigator.share) {
        try { await navigator.share({ title, text: `Join me at ${title}`, url }); return; } catch {}
      }
      try { await navigator.clipboard.writeText(url); }
      catch {
        const ta = document.createElement('textarea');
        ta.value = url; ta.style.cssText = 'position:fixed;top:-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
      }
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ══════════════════════════════════════════
       COLLAPSIBLES
    ══════════════════════════════════════════ */
    function initCollapsibles() {
      document.querySelectorAll('.collapsible-header').forEach(h => {
        h.addEventListener('click', () => {
          const targetId = h.dataset.target;
          const content  = document.getElementById(targetId);
          if (!content) return;
          const isOpen = h.classList.toggle('open');
          content.classList.toggle('open', isOpen);
          content.style.maxHeight = isOpen ? content.scrollHeight + 'px' : '0';
        });
      });
    }
  </script>
